<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1080" width="1080" height="1080">
  <defs>
    <radialGradient id="bg-grad" cx="50%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#0B1940"/>
      <stop offset="100%" stop-color="#030A1C"/>
    </radialGradient>
    <radialGradient id="orb-sphere" cx="36%" cy="32%" r="68%">
      <stop offset="0%" stop-color="#BFDBFE"/>
      <stop offset="22%" stop-color="#3B82F6"/>
      <stop offset="52%" stop-color="#1E40AF"/>
      <stop offset="78%" stop-color="#1A2D78"/>
      <stop offset="100%" stop-color="#0A1535"/>
    </radialGradient>
    <radialGradient id="glow-purple" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7C3AED" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow-deep" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#4C1D95" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#4C1D95" stop-opacity="0"/>
    </radialGradient>
    <!-- Lambda gradient coords are in the local (pre-scale) coordinate space of the referencing group -->
    <linearGradient id="lambda-bb" gradientUnits="userSpaceOnUse" x1="119" y1="54" x2="119" y2="8">
      <stop offset="0%" stop-color="#5B21B6"/>
      <stop offset="55%" stop-color="#7C3AED"/>
      <stop offset="100%" stop-color="#A78BFA"/>
    </linearGradient>
    <linearGradient id="lambda-hl" gradientUnits="userSpaceOnUse" x1="172" y1="48" x2="172" y2="7">
      <stop offset="0%" stop-color="#6D28D9"/>
      <stop offset="100%" stop-color="#C084FC"/>
    </linearGradient>
    <linearGradient id="ring-grad" gradientUnits="userSpaceOnUse" x1="290" y1="375" x2="790" y2="375">
      <stop offset="0%"   stop-color="#7C3AED" stop-opacity="0"/>
      <stop offset="25%"  stop-color="#7C3AED" stop-opacity="0.55"/>
      <stop offset="75%"  stop-color="#A78BFA" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#7C3AED" stop-opacity="0"/>
    </linearGradient>
    <filter id="blur-xl" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="48"/>
    </filter>
    <filter id="blur-lg" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="24"/>
    </filter>
    <filter id="blur-sm" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="7"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1080" height="1080" fill="url(#bg-grad)"/>

  <!-- Orb: outer ambient glow layers -->
  <circle cx="540" cy="375" r="320" fill="url(#glow-deep)"   filter="url(#blur-xl)"/>
  <circle cx="540" cy="375" r="255" fill="url(#glow-purple)" filter="url(#blur-lg)"/>

  <!-- Orb: main sphere -->
  <circle cx="540" cy="375" r="182" fill="url(#orb-sphere)"/>

  <!-- Orbital ring -->
  <ellipse cx="540" cy="375" rx="248" ry="62"
           fill="none" stroke="url(#ring-grad)" stroke-width="1.5"
           transform="rotate(-15, 540, 375)"/>
  <ellipse cx="540" cy="375" rx="248" ry="62"
           fill="none" stroke="#8B5CF6" stroke-width="5" stroke-opacity="0.12"
           filter="url(#blur-sm)"
           transform="rotate(-15, 540, 375)"/>

  <!-- Second fainter ring -->
  <ellipse cx="540" cy="375" rx="214" ry="54"
           fill="none" stroke="#6D28D9" stroke-width="1" stroke-opacity="0.22"
           transform="rotate(22, 540, 375)"/>

  <!-- Orbital satellites -->
  <circle cx="312" cy="414" r="5.5" fill="#C4B5FD" opacity="0.95"/>
  <circle cx="312" cy="414" r="13"  fill="#7C3AED" opacity="0.35" filter="url(#blur-sm)"/>
  <circle cx="755" cy="350" r="4"   fill="#67E8F9" opacity="0.9"/>
  <circle cx="755" cy="350" r="10"  fill="#06B6D4" opacity="0.28" filter="url(#blur-sm)"/>

  <!-- Sphere specular highlight -->
  <ellipse cx="494" cy="325" rx="64" ry="42" fill="white" opacity="0.065"/>

